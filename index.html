<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KeyFlow | Play Piano Online</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .app-header { display: flex; justify-content: space-between; padding: 20px; background: rgba(0,0,0,0.8); }
        .piano-container { display: flex; justify-content: center; align-items: center; height: calc(100vh - 80px); }
        .keyboard { display: flex; position: relative; }
        .key { border: 1px solid #333; border-radius: 0 0 5px 5px; cursor: pointer; transition: background 0.1s; }
        .key.white { width: 60px; height: 250px; background: #fff; z-index: 1; }
        .key.white:active, .key.white.active { background: #eee; }
        .key.black { width: 40px; height: 150px; background: #000; margin-left: -20px; margin-right: -20px; z-index: 2; border: 1px solid #222; }
        .key.black:active, .key.black.active { background: #333; }
        .btn { background: #333; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .btn:hover { background: #444; }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="logo"><h2><i class="ph ph-piano-keys"></i> KeyFlow</h2></div>
        <nav>
            <a href="admin-dashboard.html" class="btn">Admin Panel</a>
        </nav>
    </header>
    <main class="piano-container">
        <div class="keyboard" id="pianoKeyboard">
            <div class="key white" data-note="C4"></div>
            <div class="key black" data-note="C#4"></div>
            <div class="key white" data-note="D4"></div>
            <div class="key black" data-note="D#4"></div>
            <div class="key white" data-note="E4"></div>
            <div class="key white" data-note="F4"></div>
            <div class="key black" data-note="F#4"></div>
            <div class="key white" data-note="G4"></div>
            <div class="key black" data-note="G#4"></div>
            <div class="key white" data-note="A4"></div>
            <div class="key black" data-note="A#4"></div>
            <div class="key white" data-note="B4"></div>
        </div>
    </main>
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq) {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1);
        }
        const frequencies = { 'C4': 261.63, 'C#4': 277.18, 'D4': 293.66, 'D#4': 311.13, 'E4': 329.63, 'F4': 349.23, 'F#4': 369.99, 'G4': 392.00, 'G#4': 415.30, 'A4': 440.00, 'A#4': 466.16, 'B4': 493.88 };
        document.querySelectorAll('.key').forEach(key => {
            key.addEventListener('mousedown', () => {
                key.classList.add('active');
                if(audioCtx.state === "suspended") audioCtx.resume();
                playTone(frequencies[key.dataset.note]);
            });
            key.addEventListener('mouseup', () => key.classList.remove('active'));
            key.addEventListener('mouseleave', () => key.classList.remove('active'));
        });
    </script>
</body>
</html>
